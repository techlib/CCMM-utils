name: Sync and Flatten CCMM

on:
  repository_dispatch:
    types: [ccmm_xsd_updated]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  sync-and-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          path: destination
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout CCMM source
        uses: actions/checkout@v4
        with:
          repository: techlib/CCMM
          path: source

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils
          pip install lxml click

      - name: Copy XSD directories
        run: |
         
          TARGET_DIR="destination/flattenCCMM/mirror-ccmm"
          
          # Vyčištění cíle
          if [ -d "$TARGET_DIR" ]; then
            rm -rf "$TARGET_DIR"/*
          else
            mkdir -p "$TARGET_DIR"
          fi
          
          cd source
          find . -name "*.xsd" > xsd_list.txt
          if [ -s xsd_list.txt ]; then
            cat xsd_list.txt | xargs cp --parents -t "../$TARGET_DIR/"
            echo "Kopírování do $TARGET_DIR dokončeno."
          else
            echo "Chyba: Žádné XSD nenalezeny."
            exit 1
          fi

      - name: Run flattenCCMM
        run: |
          # Přechod do nově pojmenovaného adresáře
          cd destination/flattenCCMM
          
          python scripts/merge_schemas.py mirror-ccmm/ output/ccmm_merged.xsd
      - name: Validate XML samples against merged XSD
        run: |
          echo "Validation CCMM XML samples starts..."
                  
          
          SCHEMA="destination/flattenCCMM/output/ccmm_merged.xsd"
          SAMPLES_DIR="source/_metadata-samples/xml"
          
          # Check samples in dir
          if [ ! -d "$SAMPLES_DIR" ]; then
            echo "Error: samples not found in $SAMPLES_DIR"
            exit 1
          fi

          # Validation CCMM XML samples using xmllint
          for xml_file in "$SAMPLES_DIR"/*.xml; do
            echo "Validates: $(basename "$xml_file")"
            if xmllint --noout --schema "$SCHEMA" "$xml_file"; then
              echo "OK: $(basename "$xml_file") is valid."
            else
              echo "Error: $(basename "$xml_file") does not conform to the schema!"
              exit 1
            fi
          done
          
          echo "Successful validation of all CCMM XML samples."
      # 5. Commit a Push
      - name: Commit and push
        run: |
          cd destination
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
          git add flattenCCMM/
          
          if ! git diff --cached --quiet; then
            git commit -m "Update: Synchronized and flattened XSD in flattenCCMM/"
            git push origin HEAD
          else
            echo "No changes to commit"
          fi
